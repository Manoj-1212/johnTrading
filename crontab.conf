# JOHN TRADING SYSTEM - CRON SCHEDULES
# Add these lines to your crontab: crontab -e

# Run full pipeline daily at 4 PM UTC (after market close)
# Generates signals, updates backtest, logs results
0 16 * * * cd /home/ubuntu/johntrading && source .venv/bin/activate && python run_all.py >> logs/trading.log 2>&1

# Alternative: Run at market open (9 AM UTC = 4 AM EST)
# 0 9 * * 1-5 cd /home/ubuntu/johntrading && source .venv/bin/activate && python run_all.py >> logs/trading.log 2>&1

# Alternative: Run every 4 hours during trading hours
# 0 9,13,17,21 * * 1-5 cd /home/ubuntu/johntrading && source .venv/bin/activate && python run_phase4.py >> logs/signals.log 2>&1

# Daily signals at 4 PM UTC (lightweight - just Phase 4)
0 16 * * * cd /home/ubuntu/johntrading && source .venv/bin/activate && python run_phase4.py >> logs/signals.log 2>&1

# Weekly deep analysis (Sunday 6 PM UTC)
0 18 * * 0 cd /home/ubuntu/johntrading && source .venv/bin/activate && python run_analysis_improvements.py >> logs/analysis.log 2>&1

# Daily backup at 5 AM UTC
0 5 * * * cd /home/ubuntu/johntrading && tar -czf backup_$(date +\%Y\%m\%d).tar.gz phase3_backtest/results/ phase6_paper_trade/ && find . -name 'backup_*.tar.gz' -mtime +7 -delete

# Rotate logs to prevent disk fill-up (keep last 30 days)
0 0 * * * find /home/ubuntu/johntrading/logs -name "*.log" -mtime +30 -delete

# Verify system health daily at 3 PM UTC
0 15 * * * cd /home/ubuntu/johntrading && source .venv/bin/activate && python -c "from phase2_indicators.combiner import build_full_indicator_set; print('System OK')" >> logs/healthcheck.log 2>&1
